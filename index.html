<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>REAL R14 - Gestión Logística</title>
    <!-- Outfit Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="app-loader" id="appLoader">
        <div>
            <div class="spinner"></div>
            <div class="loader-text">CARGANDO MATRIZ LOMAS</div>
        </div>
    </div>

    <!-- Purple Header Area -->
    <header class="header-wrapper">
        <div class="top-bar">
            
            <!-- LOGOS -->
            <div class="logo-section">
                <img src="img/logo_r14.png" alt="R14 Real de Catorce" class="logo-r14">
                <div class="logo-divider"></div>
                <img src="img/logo_lz.png" alt="Lomas de Zamora" class="logo-lz">
            </div>

            <!-- EMBEDDED MICRO-KPIS -->
            <div class="kpi-row-header">
                <!-- Card 1 -->
                <div class="kpi-mini-card">
                    <div class="kpi-mini-icon kpi-icon--blue">
                        <svg viewBox="0 0 24 24"><path d="M20 8h-3V4H3c-1.1 0-2 .9-2 2v11h2c0 1.66 1.34 3 3 3s3-1.34 3-3h6c0 1.66 1.34 3 3 3s3-1.34 3-3h2v-5l-3-4z"/></svg>
                    </div>
                    <div class="kpi-mini-data">
                        <span class="kpi-mini-title">COLEGIOS</span>
                        <span class="kpi-mini-value" id="kpiColegios">0</span>
                    </div>
                </div>
                <!-- Card 2 -->
                <div class="kpi-mini-card">
                    <div class="kpi-mini-icon kpi-icon--green">
                       <svg viewBox="0 0 24 24"><path d="M20.5 3l-.16.03L15 5.1 9 3 3.36 4.9c-.21.07-.36.25-.36.48V20.5c0 .28.22.5.5.5l.16-.03L9 18.9l6 2.1 5.64-1.9c.21-.07.36-.25.36-.48V3.5c0-.28-.22-.5-.5-.5zM15 19l-6-2.11V5l6 2.11V19z"/></svg>
                    </div>
                    <div class="kpi-mini-data">
                        <span class="kpi-mini-title">RECORRIDO</span>
                        <span class="kpi-mini-value" id="kpiDistancia" style="color:var(--green);">0.0 km</span>
                    </div>
                </div>
                <!-- Card 3 -->
                <div class="kpi-mini-card">
                    <div class="kpi-mini-icon kpi-icon--orange">
                       <svg viewBox="0 0 24 24"><path d="M21 16.5c0 .38-.21.71-.53.88l-7.9 4.44c-.16.12-.36.18-.57.18s-.41-.06-.57-.18l-7.9-4.44A.991.991 0 0 1 3 16.5v-9c0-.38.21-.71.53-.88l7.9-4.44c.16-.12.36-.18.57-.18s.41.06.57.18l7.9 4.44c.32.17.53.5.53.88v9zM12 4.15L6.04 7.5 12 10.85l5.96-3.35L12 4.15z"/></svg>
                    </div>
                    <div class="kpi-mini-data">
                        <span class="kpi-mini-title">CUPOS</span>
                        <span class="kpi-mini-value" id="kpiCupos" style="color:var(--orange);">0</span>
                    </div>
                </div>
            </div>

        </div>
        
        <!-- Navigation Tabs / Mega Menu Filters -->
        <div class="nav-links">
            <!-- TABS (Mapa, Análisis Pliego, Análisis Zona) -->
            <div class="nav-tabs-group">
                <button class="nav-tab-btn active" id="tabMapa" data-tab="mapa">🗺️ Mapa de Flota</button>
                <button class="nav-tab-btn" id="tabAnalisisPliego" data-tab="analisis-pliego">🏘️ Cupos por Barrio</button>
                <button class="nav-tab-btn" id="tabAnalisisZona" data-tab="analisis-zona">📋 Cupos por Pliego</button>
                <button class="nav-tab-btn" id="tabPresentacion" data-tab="presentacion">📊 Análisis de Rezonificación</button>
                <button class="nav-tab-btn" id="tabPorQue" data-tab="por-que">❓ ¿Por qué Rezonificar?</button>
                <button class="nav-tab-btn" id="tabLocalidad" data-tab="analisis-localidad">💰 Desglose + Costos Estimados</button>
            </div>

            <span class="filter-label">FILTROS:</span>

            <div class="header-dropdown" id="dropdownLoc">
                <div class="dropdown-toggle" id="toggleLoc">
                    📍 Escuelas por Localidad <span class="icon">▼</span>
                </div>
                <div class="dropdown-menu" id="nav-loc"></div>
            </div>

            <div class="header-dropdown" id="dropdownPliego">
                <div class="dropdown-toggle" id="togglePliego">
                    📑 Escuelas por Pliego <span class="icon">▼</span>
                </div>
                <div class="dropdown-menu" id="nav-pliego"></div>
            </div>

            <button class="pill-btn btn-todas" style="margin-left: auto; text-transform: uppercase;">Recargar Vista Total</button>
            <button class="pill-btn" id="btnDemo" style="margin-left: 10px; background: rgba(67, 81, 232, 0.2); color: #fff; border-color: var(--blue);">▶ Demo Comparativa</button>
            <button class="pill-btn" id="btnStopDemo" style="margin-left: 10px; background: rgba(214, 48, 49, 0.2); color: #fff; border-color: #d63031; display: none;">⏹ Detener Demo</button>
        </div>
    </header>

    <main class="dashboard-content">

        <!-- Análisis Container (hidden by default) -->
        <div id="analisisContainer" class="analisis-container" style="display: none;"></div>

        <!-- Presentación Container (hidden by default) -->
        <div id="presentacionContainer" class="analisis-container" style="display: none;"></div>

        <!-- Desglose + Costos Estimados Container (hidden by default) -->
        <div id="localidadContainer" class="analisis-container" style="display: none;"></div>

        <!-- ¿Por qué Rezonificar? Container (hidden by default) -->
        <div id="porQueContainer" class="analisis-container" style="display: none;"></div>

        <!-- Lower Section: Map above, List below -->
        <div class="main-area" id="mapaSection">
            <!-- Map Panel (TOP) -->
            <section class="map-container">
                <!-- Presentation Overlay — dentro del map-container para que sea visible en fullscreen -->
                <div id="presentationOverlay">
                    <h2 id="poTitle">Modo Presentación</h2>
                    <p id="poText">Iniciando análisis territorial...</p>
                </div>
                <div class="map-header-bar">
                    <div style="display:flex; align-items:center; gap:15px;">
                        <div>
                            <h3>MAPA DE FLOTA EN VIVO</h3>
                            <p>Vista acotada a <strong>Partido de Lomas de Zamora</strong>. Capa de diseño Dark activada.</p>
                        </div>
                    </div>
                    <!-- Navigation arrows -->
                    <div class="map-nav-controls" style="display:flex; gap:10px;">
                        <button class="map-nav-btn" id="mapNavPrev" title="Colegio anterior">◀ Anterior</button>
                        <button class="map-nav-btn" id="mapNavNext" title="Siguiente colegio">Siguiente ▶</button>
                    </div>
                </div>
                <div id="mapa"></div>
            </section>

            <!-- Sidebar for the List of schools (BOTTOM) -->
            <aside class="sidebar">
                <div id="listaColegios"></div>
            </aside>
        </div>
    </main>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="data/colegios.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
