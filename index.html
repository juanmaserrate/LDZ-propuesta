<style>
  /* Header con logos reales */
  .brand-lock img.logo-img { height: 42px; width: auto; display: block; background: transparent; padding: 0; }
  .logo-divider-mini { width: 1px; height: 28px; background: var(--line); margin: 0 6px; }

  /* Intro overlay institucional */
  #introOverlay {
    position: fixed; inset: 0; z-index: 100;
    background: linear-gradient(135deg, var(--paper) 0%, var(--celeste-50) 50%, var(--celeste-100) 100%);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    padding: 40px 24px; text-align: center;
    transition: opacity .6s ease, visibility .6s ease;
  }
  #introOverlay.hidden { opacity: 0; visibility: hidden; pointer-events: none; }
  .intro-logos { display: flex; align-items: center; gap: 22px; margin-bottom: 36px; }
  .intro-logos img { height: 56px; background: white; padding: 6px 14px; border-radius: 8px; box-shadow: var(--sh-sm); }
  .intro-logos .x { font-family: var(--f-mono); color: var(--ink-500); font-size: 18px; }
  .intro-pill { background: white; border: 1px solid var(--celeste-200); color: var(--celeste-700); padding: 8px 16px; border-radius: 999px; font-family: var(--f-mono); font-size: 11px; letter-spacing: .14em; text-transform: uppercase; margin-bottom: 24px; box-shadow: var(--sh-sm); }
  .intro-title { font-family: var(--f-display); font-weight: 700; font-size: clamp(34px, 5.2vw, 64px); letter-spacing: -0.03em; line-height: 1.05; max-width: 14ch; margin: 0 auto 20px; color: var(--celeste-900); }
  .intro-sub { font-family: var(--f-body); color: var(--ink-700); font-size: clamp(15px, 1.4vw, 18px); max-width: 56ch; margin: 0 auto 40px; line-height: 1.55; }
  .intro-anim { width: min(560px, 92vw); height: 240px; margin-bottom: 36px; }
  .intro-cta { display: flex; gap: 14px; flex-wrap: wrap; justify-content: center; }
  .intro-skip { position: absolute; top: 22px; right: 26px; background: transparent; border: 0; color: var(--ink-500); font-family: var(--f-mono); font-size: 11px; letter-spacing: .14em; text-transform: uppercase; cursor: pointer; }
  .intro-skip:hover { color: var(--celeste-700); }

  @keyframes regroup { 0% { transform: translate(0,0); opacity: .35; } 100% { transform: translate(var(--tx,0), var(--ty,0)); opacity: 1; } }
  .intro-dot { animation: regroup 2.4s cubic-bezier(.6,.05,.2,1) forwards; transform-origin: center; }

  /* Footer logos */
  .foot-logos { display: flex; align-items: center; gap: 16px; margin-top: 18px; }
  .foot-logos img { height: 38px; background: white; padding: 4px 10px; border-radius: 6px; }
</style>

          ))}
        </div>
      </div>
      <Footer data={data.footer}/>
    </section>
  );
